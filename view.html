<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Press Kit — THIRD KAGURA</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#0a0a0a; --surface:#141414;
      --border:#2a2a2a; --border-a:rgba(255,255,255,0.1);
      --accent:#c4a265;
      --text:#f0f0f0; --text-dim:#aaa; --text-muted:#666;
      --radius:6px;
    }
    html { scroll-behavior:smooth; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); line-height:1.7; min-height:100vh; }

    /* =============== PATTERN 1 — Photo fade =============== */
    .p1-hero { position:relative; width:100%; max-width:480px; margin:0 auto; aspect-ratio:3/4; overflow:hidden; }
    .p1-hero img { width:100%; height:100%; object-fit:cover; display:block; }
    .p1-hero .hero-overlay { position:absolute; inset:0; background:linear-gradient(180deg, transparent 10%, rgba(10,10,10,0.15) 30%, rgba(10,10,10,0.6) 55%, rgba(10,10,10,0.92) 75%, #0a0a0a 100%); }
    .p1-hero .hero-content { position:absolute; bottom:0; left:0; right:0; padding:0 28px 32px; text-align:center; }

    /* =============== PATTERN 2 — Background image =============== */
    body.pat2 .bg-layer { position:fixed; inset:0; z-index:0; background-size:cover; background-position:center top; filter:brightness(0.35) blur(1px); }
    body.pat2 .bg-overlay { position:fixed; inset:0; z-index:1; background:linear-gradient(180deg, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.5) 40%, rgba(10,10,10,0.7) 100%); }
    body.pat2 .content-wrap { position:relative; z-index:2; }
    body.pat2 .parent-block { background:rgba(20,20,20,0.25); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); border-color:var(--border-a); }
    body.pat2 .hero-content { text-align:center; padding:56px 0 24px; }
    body.pat2 .hero-name { text-shadow:0 2px 12px rgba(0,0,0,0.6); }
    body.pat2 .hero-subtitle { text-shadow:0 1px 6px rgba(0,0,0,0.5); }
    body.pat2 .genre-tag { background:rgba(0,0,0,0.3); }

    /* =============== PATTERN 3 — Linktree round icon =============== */
    .p3-hero { text-align:center; padding:52px 0 20px; }
    .p3-hero img { width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid var(--accent); margin-bottom:16px; }

    /* =============== SHARED STYLES =============== */
    .content-wrap { max-width:480px; margin:0 auto; padding:0 20px; }
    .container { max-width:480px; margin:0 auto; padding:8px 20px 0; }
    .hero-name { font-size:36px; font-weight:800; letter-spacing:2px; display:inline-flex; align-items:center; gap:10px; justify-content:center; }
    .ig-icon { width:22px; height:22px; opacity:0.7; transition:opacity 0.2s; cursor:pointer; color:var(--text); }
    .ig-icon:hover { opacity:1; }
    .hero-subtitle { font-size:13px; color:var(--text-dim); margin-bottom:12px; letter-spacing:0.5px; }
    .genre-tags { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
    .genre-tag { padding:4px 16px; border:1px solid var(--accent); border-radius:20px; font-size:11px; color:var(--accent); letter-spacing:0.5px; font-weight:500; }

    /* Parent block */
    .parent-block { border:1px solid var(--border); border-radius:var(--radius); margin-bottom:12px; overflow:hidden; background:var(--surface); }
    .parent-header { padding:14px 16px; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:2px; color:var(--text); }
    .parent-body { padding:16px; }
    #secAbout .parent-header { padding-bottom:2px; }
    #secAbout .parent-body { padding-top:4px; }

    /* Sub accordion */
    .sub-acc-header { display:flex; align-items:center; gap:8px; padding:10px 0; cursor:pointer; user-select:none; }
    .sub-acc-icon { font-size:0; color:var(--accent); width:16px; text-align:center; font-family:monospace; }
    .sub-acc:not(.open) .sub-acc-icon::after { content:'+'; font-size:14px; }
    .sub-acc.open .sub-acc-icon::after { content:'\2212'; font-size:14px; }
    .sub-acc-label { font-size:13px; font-weight:500; color:var(--text-dim); letter-spacing:0.5px; text-transform:uppercase; }
    .sub-acc-body { display:none; padding:0 0 8px 24px; }
    .sub-acc.open .sub-acc-body { display:block; }

    /* Bio */
    .bio-text { font-size:14px; color:var(--text-dim); line-height:1.8; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .bio-text.expanded { display:block; -webkit-line-clamp:unset; }
    .bio-toggle { background:none; border:none; color:var(--accent); cursor:pointer; font-size:12px; font-family:inherit; margin-top:6px; padding:0; display:none; width:100%; text-align:right; }

    /* Contact */
    .contact-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-top:14px; margin-bottom:10px; }
    .contact-always { font-size:13px; color:var(--text-dim); line-height:2; }
    .contact-always a { color:var(--accent); text-decoration:none; }
    .contact-always a:hover { text-decoration:underline; }
    .social-links { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
    .social-link { padding:6px 12px; border:1px solid var(--border); border-radius:var(--radius); color:var(--text-dim); text-decoration:none; font-size:12px; transition:border-color 0.2s, color 0.2s; }
    body.pat2 .social-link { border-color:var(--border-a); }
    .social-link:hover { border-color:var(--accent); color:var(--accent); }

    /* Activity */
    .act-item { font-size:13px; color:var(--text-dim); line-height:1.7; margin-bottom:6px; }
    .act-item .act-title { font-weight:600; color:var(--text); font-size:14px; }
    .act-item .act-meta { font-size:12px; color:var(--text-muted); }

    /* Listen */
    .listen-item { margin-bottom:12px; }
    .listen-item:last-child { margin-bottom:0; }
    .listen-item iframe { width:100%; border-radius:var(--radius); }

    /* Featured Links */
    .feat-link { display:block; border-radius:var(--radius); overflow:hidden; margin-bottom:12px; text-decoration:none; transition:opacity 0.2s; }
    .feat-link:last-child { margin-bottom:0; }
    .feat-link:hover { opacity:0.85; }
    .feat-link img { width:100%; aspect-ratio:16/5; object-fit:cover; display:block; }
    .feat-link .feat-label { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-top:none; border-radius:0 0 var(--radius) var(--radius); font-size:13px; font-weight:600; color:var(--text); }
    body.pat2 .feat-link .feat-label { background:rgba(20,20,20,0.4); border-color:var(--border-a); }
    .feat-link .feat-arrow { color:var(--accent); font-size:14px; }

    /* Next gig — linkable */
    .gig-link { display:flex; justify-content:space-between; align-items:flex-start; padding:14px 0; border-bottom:1px solid var(--border); text-decoration:none; color:inherit; transition:opacity 0.2s; }
    body.pat2 .gig-link { border-color:var(--border-a); }
    .gig-link:last-child { border-bottom:none; }
    .gig-link:hover { opacity:0.8; }
    .gig-link .gig-info { flex:1; min-width:0; padding-right:12px; }
    .gig-link .gig-name { font-weight:600; color:var(--text); font-size:14px; line-height:1.4; }
    .gig-link .gig-detail { font-size:12px; color:var(--text-muted); margin-top:2px; }
    .gig-link .gig-right { display:flex; flex-direction:column; align-items:flex-end; flex-shrink:0; padding-top:2px; }
    .gig-link .gig-date { font-size:11px; color:var(--text-muted); white-space:nowrap; }
    .gig-link .gig-arrow { font-size:14px; color:var(--accent); margin-top:2px; }

    /* Download */
    .dl-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; }
    .dl-header .dl-title { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:2px; color:var(--text); display:flex; align-items:center; gap:8px; }
    .dl-header .dl-title svg { width:16px; height:16px; }
    .dl-all-btn { padding:5px 12px; border:1px solid var(--accent); border-radius:16px; color:var(--accent); font-size:10px; font-weight:600; letter-spacing:0.5px; cursor:pointer; background:none; transition:background 0.2s, color 0.2s; }
    .dl-all-btn:hover { background:var(--accent); color:#0a0a0a; }
    .dl-thumbs { display:flex; gap:8px; margin-bottom:14px; }
    .dl-thumb-wrap { flex:1; }
    .dl-thumb { aspect-ratio:1; border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); }
    body.pat2 .dl-thumb { border-color:var(--border-a); }
    .dl-thumb img { width:100%; height:100%; object-fit:cover; display:block; opacity:0.85; }
    .dl-thumb-label { font-size:10px; color:var(--text-muted); text-align:center; margin-top:4px; }
    .dl-separator { border:none; border-top:1px solid var(--border); margin:10px 0; }
    body.pat2 .dl-separator { border-color:var(--border-a); }

    /* Footer */
    .footer { max-width:480px; margin:0 auto; display:flex; align-items:center; justify-content:center; gap:8px; padding:24px 20px 40px; color:var(--text-muted); font-size:10px; letter-spacing:0.5px; }
    body.pat2 .footer { position:relative; z-index:2; }
    .footer a { color:var(--text-muted); text-decoration:none; }
    .footer a:hover { color:var(--accent); }
    .footer svg { width:14px; height:14px; }


    /* Loading / Error */
    .loading-screen { display:flex; align-items:center; justify-content:center; min-height:60vh; color:var(--text-dim); font-size:14px; }
    .error-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; color:var(--text-dim); text-align:center; padding:24px; }
    .error-screen h2 { margin-bottom:12px; color:var(--text); }

    /* Hide by default */
    .bg-layer, .bg-overlay { display:none; }
    body.pat2 .bg-layer, body.pat2 .bg-overlay { display:block; }
    .p1-hero, .p3-hero { display:none; }

    @media (max-width:520px) { .hero-name { font-size:28px; } .content-wrap, .container { max-width:100%; } .p1-hero { max-width:100%; } }
  </style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">Loading...</div>
<div id="errorScreen" class="error-screen" style="display:none">
  <h2>Press kit not found</h2>
  <p>This profile may not exist or may have been removed.</p>
</div>

<!-- Background (pattern 2 only) -->
<div class="bg-layer" id="bgLayer"></div>
<div class="bg-overlay"></div>

<!-- Hero: Pattern 1 -->
<div class="p1-hero" id="p1Hero">
  <img id="p1Photo" src="" alt="">
  <div class="hero-overlay"></div>
  <div class="hero-content" id="p1Content"></div>
</div>

<!-- Hero: Pattern 3 -->
<div class="p3-hero" id="p3Hero"></div>

<div id="mainContent" style="display:none">

  <!-- Hero: Pattern 2 (inside content-wrap) -->
  <div class="content-wrap" id="contentWrap">
    <div class="hero-content" id="p2Content" style="display:none"></div>

    <!-- ===== ABOUT ===== -->
    <div class="parent-block" id="secAbout">
      <div class="parent-header">About</div>
      <div class="parent-body">
        <div class="bio-text" id="vBio"></div>
        <button class="bio-toggle" id="bioToggle" onclick="toggleBio()">Read more</button>
        <div id="vHistory"></div>
        <div id="vOrganize"></div>
        <div id="vAward"></div>
        <div class="contact-title" id="contactTitle" style="display:none">Contact</div>
        <div class="contact-always" id="vContact" style="display:none"></div>
        <div class="social-links" id="vSocial"></div>
      </div>
    </div>

    <!-- ===== LISTEN ===== -->
    <div class="parent-block" id="secListen" style="display:none">
      <div class="parent-header">Listen</div>
      <div class="parent-body" id="vListen"></div>
    </div>

    <!-- ===== FEATURED LINKS ===== -->
    <div class="parent-block" id="secFeatLinks" style="display:none">
      <div class="parent-body" id="vFeatLinks"></div>
    </div>

    <!-- ===== NEXT GIG ===== -->
    <div class="parent-block" id="secGig" style="display:none">
      <div class="parent-header">Next Gig</div>
      <div class="parent-body" id="vGig" style="padding:0 16px;"></div>
    </div>

    <!-- ===== DOWNLOAD ===== -->
    <div class="parent-block" id="secDl" style="display:none">
      <div class="dl-header">
        <span class="dl-title">Download</span>
        <button class="dl-all-btn" id="dlAllBtn" style="display:none" title="Download all"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
      </div>
      <div class="parent-body">
        <div class="dl-thumbs" id="vDlThumbs" style="display:none"></div>
        <hr class="dl-separator" id="dlSep" style="display:none">
        <div id="vDlFiles"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>Powered by</span>
    <a href="https://thirdkagura.com" target="_blank">THIRD KAGURA Pty Ltd</a>
    <a href="https://www.instagram.com/third_kagura_pty_ltd/" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg></a>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyNJ5Wk7frGflBAmZ_2gLu3NrDOKf1g_WYT6sOW-rHXQuCg6FzWwLaoT7pZOOZyXee2/exec';
const params = new URLSearchParams(location.search);
const slug = params.get('id');
const designParam = parseInt(params.get('design')) || 2;

if (!slug) { showError(); } else { loadProfile(slug); }

function showError() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('errorScreen').style.display = 'flex';
}

async function loadProfile(id) {
  try {
    const res = await fetch(GAS_URL + '?id=' + encodeURIComponent(id));
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    renderProfile(d);
  } catch (e) { showError(); }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function jp(s) { try { return JSON.parse(s); } catch(e) { return null; } }
let currentAccent = '#c4a265';

function renderProfile(d) {
  const pattern = designParam;
  document.title = (d.artistName || 'Press Kit') + ' — THIRD KAGURA';

  // Accent color
  if (d.accentColor) {
    currentAccent = d.accentColor;
    document.documentElement.style.setProperty('--accent', d.accentColor);
  }

  // Custom font
  if (d.font) {
    document.body.style.fontFamily = "'" + d.font + "', sans-serif";
  }

  // Instagram SVG
  const igSvg = '<svg class="ig-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>';
  const igUrl = d.instagram ? (d.instagram.includes('http') ? d.instagram : 'https://instagram.com/' + d.instagram.replace('@','')) : '';
  const igLink = igUrl ? '<a href="'+esc(igUrl)+'" target="_blank">'+igSvg+'</a>' : '';

  // Roles
  let roles = [];
  try { roles = JSON.parse(d.role || '[]'); } catch(e) {}
  if (typeof d.role === 'string' && !d.role.startsWith('[')) roles = d.role ? [d.role] : [];
  const roleStr = roles.join(' / ');

  // Genres
  let genres = [];
  try { genres = JSON.parse(d.genre || '[]'); } catch(e) {}
  if (typeof d.genre === 'string' && !d.genre.startsWith('[')) genres = [d.genre];
  const genreHtml = genres.map(g => '<span class="genre-tag">'+esc(g)+'</span>').join('');

  // Hero HTML
  const heroInner = '<div class="hero-name">'+esc(d.artistName || '')+' '+igLink+'</div>' +
    (roleStr ? '<div style="font-size:12px;color:var(--accent);letter-spacing:1px;font-weight:600;text-transform:uppercase;margin-bottom:4px">'+esc(roleStr)+'</div>' : '') +
    '<div class="hero-subtitle">based '+ esc(d.location || '') +'</div>' +
    '<div class="genre-tags">'+genreHtml+'</div>';

  // Pattern setup
  if (pattern === 1) {
    document.getElementById('p1Hero').style.display = 'block';
    if (d.profilePhoto) document.getElementById('p1Photo').src = d.profilePhoto;
    document.getElementById('p1Content').innerHTML = heroInner;
  } else if (pattern === 2) {
    document.body.classList.add('pat2');
    if (d.profilePhoto) document.getElementById('bgLayer').style.backgroundImage = 'url('+d.profilePhoto+')';
    document.getElementById('p2Content').style.display = 'block';
    document.getElementById('p2Content').innerHTML = heroInner;
  } else {
    document.getElementById('p3Hero').style.display = 'block';
    const photoHtml = d.profilePhoto ? '<img src="'+esc(d.profilePhoto)+'" alt="'+esc(d.artistName || '')+'">' : '';
    document.getElementById('p3Hero').innerHTML = photoHtml + '<div>' + heroInner + '</div>';
  }

  // === ABOUT: BIO ===
  const bio = (d.bio || '').trim();
  if (bio) {
    document.getElementById('vBio').textContent = bio;
    // Show toggle if text is long enough to be clamped (rough check: >200 chars)
    if (bio.length > 200) document.getElementById('bioToggle').style.display = 'block';
  }

  // === ABOUT: HISTORY (from activity) ===
  const activities = jp(d.activity) || [];
  if (activities.length > 0) {
    const el = document.getElementById('vHistory');
    let html = '<div class="sub-acc"><div class="sub-acc-header" onclick="toggleSubAcc(this)"><span class="sub-acc-icon"></span><span class="sub-acc-label">History</span></div><div class="sub-acc-body">';
    activities.forEach(a => {
      let title = '', meta = '';
      if (a.type === 'residency') {
        title = a.venue || '';
        const p = []; if (a.country) p.push(a.country);
        if (a.startDate) p.push(a.startDate + (a.currentlyRunning ? ' — Present' : (a.endDate ? ' — ' + a.endDate : '')));
        meta = p.join(' · ');
      } else if (a.type === 'clubGig') {
        title = a.eventName || '';
        const p = []; if (a.venue) p.push(a.venue); if (a.year) p.push(a.year); if (a.role) p.push(a.role);
        meta = p.join(' · ');
      } else if (a.type === 'festival') {
        title = a.name || '';
        if (a.year) meta = a.year;
      } else if (a.type === 'live') {
        title = a.name || '';
        const p = []; if (a.venue) p.push(a.venue); if (a.year) p.push(a.year);
        meta = p.join(' · ');
      } else if (a.type === 'media') {
        title = a.title || '';
        if (a.year) meta = a.year;
      } else if (a.type === 'other') {
        title = a.title || '';
        if (a.year) meta = a.year;
      }
      if (title) html += '<div class="act-item"><div class="act-title">'+esc(title)+'</div>'+(meta?'<div class="act-meta">'+esc(meta)+'</div>':'')+'</div>';
    });
    html += '</div></div>';
    el.innerHTML = html;
  }

  // === ABOUT: ORGANIZE ===
  const org = jp(d.organizer);
  if (org && org.active && org.events && org.events.length > 0) {
    const el = document.getElementById('vOrganize');
    let html = '<div class="sub-acc"><div class="sub-acc-header" onclick="toggleSubAcc(this)"><span class="sub-acc-icon"></span><span class="sub-acc-label">Organize</span></div><div class="sub-acc-body">';
    org.events.forEach(e => {
      const meta = [e.venue, e.size ? e.size+' capacity' : ''].filter(Boolean).join(' · ');
      html += '<div class="act-item"><div class="act-title">'+esc(e.name || '')+'</div>'+(meta?'<div class="act-meta">'+esc(meta)+'</div>':'')+'</div>';
    });
    html += '</div></div>';
    el.innerHTML = html;
  }

  // === ABOUT: AWARD ===
  const awards = jp(d.awards) || [];
  if (awards.length > 0) {
    const el = document.getElementById('vAward');
    let html = '<div class="sub-acc"><div class="sub-acc-header" onclick="toggleSubAcc(this)"><span class="sub-acc-icon"></span><span class="sub-acc-label">Award</span></div><div class="sub-acc-body">';
    awards.forEach(a => {
      html += '<div class="act-item"><div class="act-title">'+esc(a.title || '')+'</div><div class="act-meta">'+esc(a.year || '')+'</div></div>';
    });
    html += '</div></div>';
    el.innerHTML = html;
  }

  // === ABOUT: CONTACT ===
  const hasContact = d.agencyName || d.agencyWebsite || d.bookingEmail;
  if (hasContact) {
    document.getElementById('contactTitle').style.display = 'block';
    const cel = document.getElementById('vContact');
    cel.style.display = 'block';
    let ch = '';
    if (d.agencyName) ch += '<div style="font-weight:600;color:var(--text);margin-bottom:2px;">'+esc(d.agencyName)+'</div>';
    if (d.agencyWebsite) ch += '<div><a href="'+esc(d.agencyWebsite)+'" target="_blank">'+esc(d.agencyWebsite.replace(/^https?:\/\//,''))+'</a></div>';
    if (d.bookingEmail) ch += '<div><a href="mailto:'+esc(d.bookingEmail)+'">'+esc(d.bookingEmail)+'</a></div>';
    cel.innerHTML = ch;
  }

  // === ABOUT: SOCIAL LINKS ===
  const links = jp(d.links) || [];
  if (links.length > 0) {
    const sel = document.getElementById('vSocial');
    links.forEach(l => {
      if (!l.url) return;
      const a = document.createElement('a');
      a.className = 'social-link';
      a.href = l.url;
      a.target = '_blank';
      a.textContent = l.label || l.url;
      sel.appendChild(a);
    });
  }

  // === LISTEN ===
  const sound = (d.primarySoundLink || '').trim();
  const spots = jp(d.spotifyTracks) || [];
  if (sound || spots.length > 0) {
    document.getElementById('secListen').style.display = 'block';
    const lel = document.getElementById('vListen');
    if (sound) lel.innerHTML += '<div class="listen-item">' + buildEmbed(sound) + '</div>';
    spots.forEach(url => {
      if (!url) return;
      lel.innerHTML += '<div class="listen-item">' + buildEmbed(url) + '</div>';
    });
  }

  // === FEATURED LINKS ===
  const fl1Label = (d.featLink1Label || '').trim();
  const fl1Url = (d.featLink1Url || '').trim();
  const fl1Img = (d.featLink1Img || '').trim();
  const fl2Label = (d.featLink2Label || '').trim();
  const fl2Url = (d.featLink2Url || '').trim();
  const fl2Img = (d.featLink2Img || '').trim();
  if (fl1Label || fl2Label) {
    document.getElementById('secFeatLinks').style.display = 'block';
    const fel = document.getElementById('vFeatLinks');
    [{ label: fl1Label, url: fl1Url, img: fl1Img }, { label: fl2Label, url: fl2Url, img: fl2Img }].forEach(fl => {
      if (!fl.label) return;
      const href = fl.url ? esc(fl.url) : '#';
      const imgHtml = fl.img ? '<img src="'+esc(fl.img)+'" alt="'+esc(fl.label)+'">' : '';
      fel.innerHTML += '<a class="feat-link" href="'+href+'" target="_blank">' +
        imgHtml +
        '<div class="feat-label"><span>'+esc(fl.label)+'</span><span class="feat-arrow">→</span></div></a>';
    });
  }

  // === NEXT GIG ===
  const upcoming = jp(d.upcoming);
  if (upcoming && upcoming.active && upcoming.shows && upcoming.shows.length > 0) {
    document.getElementById('secGig').style.display = 'block';
    const gel = document.getElementById('vGig');
    upcoming.shows.forEach(s => {
      const dateStr = s.date ? formatDate(s.date) : '';
      const url = s.ticketUrl || '#';
      gel.innerHTML += '<a class="gig-link" href="'+esc(url)+'" target="_blank">' +
        '<div class="gig-info"><div class="gig-name">'+esc(s.name || '')+'</div><div class="gig-detail">'+esc(s.venue || '')+'</div></div>' +
        '<div class="gig-right"><div class="gig-date">'+esc(dateStr)+'</div>'+(s.ticketUrl?'<div class="gig-arrow">→</div>':'')+'</div></a>';
    });
  }

  // === DOWNLOAD ===
  const hasLogo = d.artistLogo;
  const hasProfile = d.profilePhoto;
  const hasPerf = d.perfPhoto;
  const hasTech = d.techRider;
  const hasHosp = d.hospRider;
  const hasAnyDl = hasLogo || hasProfile || hasPerf || hasTech || hasHosp;

  if (hasAnyDl) {
    document.getElementById('secDl').style.display = 'block';

    // Thumbnails
    if (hasLogo || hasProfile || hasPerf) {
      const thumbsEl = document.getElementById('vDlThumbs');
      thumbsEl.style.display = 'flex';
      const dlFiles = [];
      if (hasLogo) { thumbsEl.innerHTML += thumbHtml(d.artistLogo, 'Logo'); dlFiles.push({url:d.artistLogo, name:'logo'}); }
      if (hasProfile) { thumbsEl.innerHTML += thumbHtml(d.profilePhoto, 'Profile'); dlFiles.push({url:d.profilePhoto, name:'profile'}); }
      if (hasPerf) { thumbsEl.innerHTML += thumbHtml(d.perfPhoto, 'Performance'); dlFiles.push({url:d.perfPhoto, name:'performance'}); }

      // Show download button
      document.getElementById('dlAllBtn').style.display = 'block';
      window._dlFiles = dlFiles;
      document.getElementById('dlAllBtn').onclick = () => downloadZip(d);
    }

    // Riders (show as text content)
    if (hasTech || hasHosp) {
      if (hasLogo || hasProfile || hasPerf) document.getElementById('dlSep').style.display = 'block';
      const dfel = document.getElementById('vDlFiles');
      if (hasTech) dfel.innerHTML += subAccHtml('Tech Rider', '<div style="font-size:13px;color:var(--text-dim);line-height:1.7;white-space:pre-wrap;">'+esc(d.techRider)+'</div>');
      if (hasHosp) dfel.innerHTML += subAccHtml('Hospitality Rider', '<div style="font-size:13px;color:var(--text-dim);line-height:1.7;white-space:pre-wrap;">'+esc(d.hospRider)+'</div>');
    }
  }

  // Show
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
}

function thumbHtml(src, label) {
  return '<a href="'+esc(src)+'" target="_blank" class="dl-thumb-wrap" style="text-decoration:none"><div class="dl-thumb"><img src="'+esc(src)+'" alt="'+esc(label)+'"></div><div class="dl-thumb-label">'+esc(label)+'</div></a>';
}

function subAccHtml(label, body) {
  return '<div class="sub-acc"><div class="sub-acc-header" onclick="toggleSubAcc(this)"><span class="sub-acc-icon"></span><span class="sub-acc-label">'+esc(label)+'</span></div><div class="sub-acc-body">'+body+'</div></div>';
}

function buildEmbed(url) {
  if (url.includes('soundcloud.com')) {
    return '<iframe height="166" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url='+encodeURIComponent(url)+'&color=%23'+currentAccent.replace('#','')+'&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false"></iframe>';
  } else if (url.includes('spotify.com')) {
    const embedUrl = url.replace('https://open.spotify.com/', 'https://open.spotify.com/embed/');
    return '<iframe style="border-radius:12px" src="'+embedUrl+'" width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>';
  } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
    let vid = '';
    if (url.includes('youtu.be/')) vid = url.split('youtu.be/')[1]?.split('?')[0];
    else try { vid = new URL(url).searchParams.get('v'); } catch(e){}
    if (vid) return '<iframe width="100%" height="200" src="https://www.youtube.com/embed/'+vid+'" frameborder="0" allowfullscreen style="border-radius:8px"></iframe>';
    return '<a href="'+esc(url)+'" target="_blank" style="color:var(--accent)">'+esc(url)+'</a>';
  } else if (url.includes('mixcloud.com')) {
    return '<iframe width="100%" height="120" src="https://www.mixcloud.com/widget/iframe/?hide_cover=1&feed='+encodeURIComponent(url)+'" frameborder="0"></iframe>';
  }
  return '<a href="'+esc(url)+'" target="_blank" style="color:var(--accent)">'+esc(url)+'</a>';
}

function formatDate(dateStr) {
  try {
    const d = new Date(dateStr);
    const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const dd = String(d.getDate()).padStart(2,'0');
    const m = String(d.getMonth()+1).padStart(2,'0');
    const y = d.getFullYear();
    return dd+'.'+m+'.'+y+' '+days[d.getDay()];
  } catch(e) { return dateStr; }
}

function toggleBio() {
  const t = document.getElementById('vBio');
  const b = document.getElementById('bioToggle');
  t.classList.toggle('expanded');
  b.textContent = t.classList.contains('expanded') ? 'Show less' : 'Read more';
}
function toggleSubAcc(h) { h.parentElement.classList.toggle('open'); }

// ═══ ZIP DOWNLOAD (PDF + images) ═══
async function downloadZip(d) {
  const btn = document.getElementById('dlAllBtn');
  btn.style.opacity = '0.5';
  btn.style.pointerEvents = 'none';

  try {
    const zip = new JSZip();
    const folder = zip.folder(d.artistName.replace(/[^a-zA-Z0-9_-]/g,'_') + '_PressKit');

    // 1. Collect images
    const images = [];
    if (d.profilePhoto) images.push({url: d.profilePhoto, name: 'profile'});
    if (d.perfPhoto) images.push({url: d.perfPhoto, name: 'performance'});
    if (d.artistLogo) images.push({url: d.artistLogo, name: 'logo'});
    if (d.featLink1Img) images.push({url: d.featLink1Img, name: 'featured1'});
    if (d.featLink2Img) images.push({url: d.featLink2Img, name: 'featured2'});

    // Fetch images as blobs and add to zip
    for (const img of images) {
      try {
        const res = await fetch(img.url);
        const blob = await res.blob();
        const ext = blob.type.includes('png') ? '.png' : '.jpg';
        folder.file(img.name + ext, blob);
      } catch(e) { console.warn('Failed to fetch image:', img.name); }
    }

    // 2. Generate PDF — open all accordions first
    document.querySelectorAll('.sub-acc').forEach(el => el.classList.add('open'));
    const bioEl = document.getElementById('vBio');
    if (bioEl) bioEl.classList.add('expanded');

    const mainEl = document.getElementById('mainContent');
    const canvas = await html2canvas(mainEl, {
      backgroundColor: '#0a0a0a',
      scale: 2,
      useCORS: true,
      allowTaint: true,
      scrollY: -window.scrollY,
      windowWidth: 480
    });

    const { jsPDF } = window.jspdf;
    const imgWidth = 210; // A4 width in mm
    const pageHeight = 297; // A4 height in mm
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    const pdf = new jsPDF('p', 'mm', 'a4');

    let heightLeft = imgHeight;
    let position = 0;
    const imgData = canvas.toDataURL('image/jpeg', 0.92);

    pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft > 0) {
      position -= pageHeight;
      pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    const pdfBlob = pdf.output('blob');
    folder.file(d.artistName.replace(/[^a-zA-Z0-9_-]/g,'_') + '_PressKit.pdf', pdfBlob);

    // 3. Generate and download zip
    const zipBlob = await zip.generateAsync({type: 'blob'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(zipBlob);
    a.download = d.artistName.replace(/[^a-zA-Z0-9_-]/g,'_') + '_PressKit.zip';
    a.click();
    URL.revokeObjectURL(a.href);

  } catch(e) {
    console.error('Download failed:', e);
    alert('Download failed. Please try again.');
  } finally {
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  }
}
</script>
