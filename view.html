<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="address=no, telephone=no">
  <title>THIRD KAGURA — Artist Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --bg:#000000; --surface:#0a0a0a;
      --border:#232323; --border-a:rgba(255,255,255,0.09);
      --accent:#666666;
      --text:#f0f0f0; --text-dim:#999; --text-muted:#555;
      --radius:8px;
    }
    html { scroll-behavior:smooth; }
    html, body { max-width:100vw; overflow-x:hidden; }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); line-height:1.7; min-height:100vh; }

    /* ====== BG LAYERS ====== */
    .bg-layer { position:fixed; inset:0; z-index:0; background-size:cover; background-position:center top; display:none; }
    .bg-overlay { position:fixed; inset:0; z-index:1; display:none; }
    body.pat2 .bg-layer { display:block; filter:brightness(0.28) blur(2px); }
    body.pat2 .bg-overlay { display:block; background:linear-gradient(180deg, rgba(10,10,10,0.2) 0%, rgba(10,10,10,0.48) 40%, rgba(10,10,10,0.72) 100%); }
    body.pat3bg .bg-layer { display:block; filter:brightness(0.26) blur(3px); }
    body.pat3bg .bg-overlay { display:block; background:linear-gradient(180deg, rgba(10,10,10,0.1) 0%, rgba(10,10,10,0.52) 50%, rgba(10,10,10,0.82) 100%); }
    body.pat1 { background:var(--bg); }

    /* ====== LAYOUT ====== */
    .content-wrap { max-width:480px; margin:0 auto; padding:0 20px; position:relative; z-index:2; }

    /* ====== HERO: Pattern 1 — Photo fade ====== */
    .p1-hero { position:relative; width:100%; max-width:480px; margin:0 auto; aspect-ratio:3/4; overflow:hidden; display:none; }
    body.pat1 .p1-hero { display:block; }
    .p1-hero img { width:100%; height:100%; object-fit:cover; display:block; }
    .p1-hero .hero-overlay { position:absolute; inset:0; background:linear-gradient(180deg, transparent 5%, rgba(0,0,0,0.08) 25%, rgba(0,0,0,0.52) 52%, rgba(0,0,0,0.9) 72%, #000000 100%); }
    .p1-hero .hero-content { position:absolute; bottom:0; left:0; right:0; padding:0 28px 36px; text-align:center; }

    /* ====== HERO: Pattern 2 — Text on blurred bg ====== */
    .p2-hero { display:none; text-align:center; padding:120px 0 28px; position:relative; z-index:2; }
    body.pat2 .p2-hero { display:block; }

    /* ====== HERO: Pattern 3 — Round icon ====== */
    .p3-hero { display:none; text-align:center; padding:120px 0 0; position:relative; z-index:2; }
    body.pat3bg .p3-hero { display:block; }
    .p3-hero img { width:120px; height:120px; border-radius:50%; object-fit:cover; border:2px solid var(--accent); margin:0 auto 18px; display:block; }

    /* ====== SHARED HERO TEXT ====== */
    .hero-name { font-family:'Bebas Neue',sans-serif; font-size:44px; font-weight:800; letter-spacing:1px; display:inline-flex; align-items:center; gap:10px; justify-content:center; line-height:1.1; }
    body.pat2 .hero-name, body.pat3bg .hero-name { text-shadow:0 2px 20px rgba(0,0,0,0.8); }
    .hero-icon { width:32px; height:32px; opacity:0.55; color:var(--text); cursor:pointer; transition:opacity 0.2s; }
    .hero-icon:hover { opacity:1; }
    .hero-subtitle { font-size:12px; font-weight:600; color:var(--text-dim); margin-top:0; margin-bottom:0; letter-spacing:2px; text-transform:uppercase; }
    body.pat2 .hero-subtitle, body.pat3bg .hero-subtitle { text-shadow:0 1px 8px rgba(0,0,0,0.6); }
    .hero-roles { font-size:11px; color:var(--text-dim); letter-spacing:2px; font-weight:600; text-transform:uppercase; margin-top:2px; margin-bottom:0; text-align:center; }
    .hero-agency-line { margin-top:0; text-align:center; }
    .hero-agency { font-size:11px; font-weight:600; color:var(--text-dim); letter-spacing:2px; text-transform:uppercase; text-decoration:none; border-bottom:none; padding-bottom:0; }
    a.hero-agency:hover { color:var(--text); border-bottom-color:rgba(255,255,255,0.4); }
    .genre-tags { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-top:2px; }
    .genre-tag { padding:0; border:none; border-radius:0; font-size:9px; color:var(--text-dim); letter-spacing:2px; font-weight:700; background:none; text-transform:uppercase; }

    /* ====== RECOMMEND CAROUSEL ====== */
    .recommend-section { padding:10px 20px 8px; max-width:480px; margin:0 auto; position:relative; z-index:2; overflow:hidden; }
    .recommend-header { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
    .recommend-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:3px; color:var(--text-muted); }
    .recommend-count { font-size:9px; color:var(--text-muted); letter-spacing:0.5px; opacity:0.6; }
    .recommend-track { display:flex; transition:transform 0.45s ease; }
    .recommend-slide { min-width:100%; padding:0 4px; box-sizing:border-box; }
    .recommend-quote { font-size:13px; color:var(--text-dim); line-height:1.85; font-style:italic; position:relative; padding-left:16px; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; }
    .recommend-quote.expanded { display:block; -webkit-line-clamp:unset; }
    .recommend-quote::before { content:'\201C'; font-family:'Bebas Neue','Georgia',serif; font-size:28px; line-height:1; color:var(--accent); opacity:0.35; position:absolute; left:0; top:-2px; }
    .recommend-toggle { background:none; border:none; color:var(--accent); cursor:pointer; font-size:10px; font-family:inherit; padding:2px 0 0 16px; display:none; }
    .recommend-meta { display:flex; align-items:center; gap:10px; padding:10px 0 0 16px; }
    .recommend-avatar { width:28px; height:28px; border-radius:50%; background:rgba(102,102,102,0.12); flex-shrink:0; overflow:hidden; border:1px solid rgba(102,102,102,0.25); display:flex; align-items:center; justify-content:center; }
    .recommend-avatar-icon { width:12px; height:12px; color:var(--accent); opacity:0.5; }
    .recommend-name-link { text-decoration:none; color:inherit; }
    .recommend-name-link:hover .recommend-name { color:var(--accent); }
    .recommend-name { font-size:11px; font-weight:600; color:var(--text); letter-spacing:0.3px; transition:color 0.2s; }
    .recommend-role { font-size:10px; color:var(--text-muted); letter-spacing:0.3px; margin-top:1px; }
    .recommend-dots { display:flex; align-items:center; justify-content:center; gap:6px; padding:10px 0 0; }
    .recommend-dot { width:5px; height:5px; border-radius:50%; background:var(--text-muted); opacity:0.3; transition:opacity 0.25s; cursor:pointer; }
    .recommend-dot.active { opacity:1; background:var(--accent); }

    /* ====== FEATURED (standalone) ====== */
    .featured-section { padding:10px 20px 4px; max-width:480px; margin:0 auto; position:relative; z-index:2; }
    .featured-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:2px; color:var(--text-muted); display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .featured-label::after { content:''; flex:1; height:1px; background:var(--border-a); }

    .feat-more-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:10px; font-family:inherit; padding:6px 0 0; letter-spacing:0.5px; display:block; text-align:right; width:100%; }
    .feat-more-btn:hover { color:var(--text); }

    /* ====== UPCOMING (standalone) ====== */
    .upcoming-section { padding:10px 20px 4px; max-width:480px; margin:0 auto; position:relative; z-index:2; }
    .upcoming-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:2px; color:var(--text-muted); display:flex; align-items:center; gap:12px; margin-bottom:12px; }
    .upcoming-label::after { content:''; flex:1; height:1px; background:var(--border-a); }

    /* ====== ABOUT (3-line clamp) ====== */
    .about-section { padding:6px 20px 0; max-width:480px; margin:0 auto; position:relative; z-index:2; }
    .about-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:2px; color:var(--text-muted); display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .about-label::after { content:''; flex:1; height:1px; background:var(--border-a); }
    .about-text { font-size:14px; color:var(--text-dim); line-height:1.9; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .about-text.expanded { display:block; -webkit-line-clamp:unset; }
    .about-toggle { background:none; border:none; color:var(--accent); cursor:pointer; font-size:11px; font-family:inherit; margin-top:6px; padding:0; display:none; text-align:right; width:100%; letter-spacing:0.3px; }

    /* ====== SECTION TOC ====== */
    .toc-section { padding:12px 20px 4px; max-width:480px; margin:0 auto; position:relative; z-index:2; }
    .toc-item { display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--border-a); cursor:pointer; user-select:none; }
    .toc-item:last-child { border-bottom:none; }
    .toc-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:2px; color:var(--text-muted); transition:color 0.2s; }
    .toc-item:hover .toc-label { color:var(--text); }
    .toc-arrow { width:14px; height:14px; color:var(--text-muted); transition:transform 0.25s; flex-shrink:0; }
    .toc-item.open .toc-arrow { transform:rotate(180deg); }
    .toc-body { display:none; padding:0 0 12px; }
    .toc-item.open + .toc-body { display:block; }

    /* ====== HISTORY ====== */
    .hist-cat { padding-bottom:14px; margin-bottom:14px; border-bottom:1px solid var(--border-a); }
    .hist-cat:last-child { border-bottom:none; padding-bottom:0; margin-bottom:0; }
    .hist-cat-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:2.5px; color:var(--accent); margin-bottom:8px; opacity:0.8; }
    .hist-item { display:flex; gap:16px; padding:5px 0; align-items:flex-start; }
    .hist-year { font-size:11px; color:var(--accent); font-weight:600; width:80px; min-width:80px; flex-shrink:0; }
    .hist-venue { font-size:13px; font-weight:600; color:var(--text); line-height:1.4; }
    .hist-loc { font-size:11px; color:var(--text-muted); margin-top:2px; }
    .res-year-block { display:flex; align-items:flex-end; gap:4px; }
    .res-col { display:flex; flex-direction:column; }
    .res-month { font-size:5px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:0; line-height:1.2; color:var(--accent); }
    .res-dash { align-self:flex-end; }
    .hl-year { font-size:13px; }
    .hist-role-label { font-size:13px; font-weight:600; color:var(--text); text-transform:uppercase; letter-spacing:1px; margin-top:1px; }
    .award-item { display:flex; gap:16px; padding:5px 0; align-items:flex-start; }
    .award-year { font-size:11px; color:var(--accent); font-weight:600; flex-shrink:0; width:80px; min-width:80px; }
    .award-title { font-size:13px; font-weight:600; color:var(--text); line-height:1.4; }

    /* ====== FEATURED ====== */
    .feat-link { display:flex; align-items:center; gap:12px; padding:10px 14px; background:rgba(255,255,255,0.03); border:1px solid var(--border-a); border-radius:var(--radius); text-decoration:none; transition:border-color 0.2s; margin-bottom:8px; }
    .feat-link:last-child { margin-bottom:0; }
    .feat-link:hover { border-color:var(--accent); }
    .feat-thumb { width:40px; height:40px; border-radius:6px; overflow:hidden; flex-shrink:0; background:rgba(255,255,255,0.06); display:flex; align-items:center; justify-content:center; }
    .feat-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .feat-title-text { flex:1; min-width:0; font-size:13px; font-weight:600; color:var(--text); line-height:1.4; }
    .feat-link-arrow { flex-shrink:0; color:var(--text-muted); }
    .listen-item { margin-bottom:8px; }
    .listen-item:last-child { margin-bottom:0; }
    .listen-fallback { display:flex; align-items:center; gap:12px; padding:10px 14px; background:rgba(255,255,255,0.03); border:1px solid var(--border-a); border-radius:var(--radius); text-decoration:none; transition:border-color 0.2s; }
    .listen-fallback:hover { border-color:var(--accent); }
    .lf-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .lf-icon.sc { background:#f50; } .lf-icon.sp { background:#1db954; }
    .lf-icon.yt { background:#ff0000; } .lf-icon.mc { background:#5000ff; }
    .lf-icon.am { background:linear-gradient(135deg,#fc3c44,#c643fc,#3b9dff); }
    .lf-icon.default { background:var(--accent); }
    .lf-text { flex:1; min-width:0; } .lf-label { font-size:13px; font-weight:600; color:var(--text); }
    .lf-arrow { flex-shrink:0; color:var(--text-muted); }

    /* ====== UPCOMING ====== */
    .ticket-card { display:flex; gap:12px; padding:10px 14px; background:rgba(255,255,255,0.03); border:1px solid var(--border-a); border-radius:var(--radius); text-decoration:none; transition:border-color 0.2s; margin-bottom:8px; }
    .ticket-card:last-child { margin-bottom:0; }
    .ticket-card:hover { border-color:var(--accent); }
    .ticket-icon { width:40px; height:40px; border-radius:var(--radius); background:rgba(255,255,255,0.05); flex-shrink:0; display:flex; align-items:center; justify-content:center; }
    .ticket-icon svg { width:18px; height:18px; color:var(--accent); }
    .ticket-info { flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center; }
    .ticket-name { font-size:13px; font-weight:600; color:var(--text); line-height:1.3; }
    .ticket-detail { font-size:11px; color:var(--text-muted); margin-top:2px; }

    /* ====== DOWNLOAD ====== */
    .dl-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:12px; }
    .dl-all-wrap { display:flex; justify-content:flex-end; padding:4px 0 0; }
    .dl-all-btn { display:inline-flex; align-items:center; gap:6px; background:none; border:1px solid var(--border-a); border-radius:20px; color:var(--text-dim); font-size:10px; font-family:inherit; padding:7px 16px; cursor:pointer; letter-spacing:0.8px; text-transform:uppercase; transition:all 0.2s; }
    .dl-all-btn:hover { border-color:var(--accent); color:var(--text); }
    .dl-all-btn svg { width:13px; height:13px; }
    .dl-thumbs { display:flex; gap:8px; margin-bottom:12px; }
    .dl-thumb-wrap { flex:1; text-decoration:none; }
    .dl-thumb { aspect-ratio:1; border-radius:var(--radius); overflow:hidden; border:1px solid var(--border-a); }
    .dl-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
    .dl-thumb-label { font-size:10px; color:var(--text-muted); text-align:center; margin-top:5px; letter-spacing:0.3px; }
    .dl-separator { border:none; border-top:1px solid var(--border-a); margin:10px 0; }
    .sub-acc-header { display:flex; align-items:center; gap:10px; padding:9px 0; cursor:pointer; user-select:none; }
    .sub-acc-icon { font-size:0; color:var(--accent); width:16px; text-align:center; font-family:monospace; flex-shrink:0; }
    .sub-acc:not(.open) .sub-acc-icon::after { content:'+'; font-size:14px; }
    .sub-acc.open .sub-acc-icon::after { content:'\2212'; font-size:14px; }
    .sub-acc-label { font-size:12px; font-weight:500; color:var(--text-dim); letter-spacing:0.5px; text-transform:uppercase; }
    .sub-acc-body { display:none; padding:0 0 10px 26px; }
    .sub-acc.open .sub-acc-body { display:block; }

    /* ====== CONTACT ====== */
    .contact-agency { font-size:14px; font-weight:700; color:var(--text); margin-bottom:6px; }
    .contact-row { font-size:13px; color:var(--text-dim); line-height:1.9; }
    .contact-row a { color:var(--accent); text-decoration:none; }
    .contact-row a:hover { text-decoration:underline; }
    .contact-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-top:10px; margin-bottom:2px; }

    /* ====== SOCIAL ICONS BAR ====== */
    .social-bar { display:flex; align-items:center; justify-content:center; gap:16px; padding:24px 0 8px; position:relative; z-index:2; max-width:480px; margin:0 auto; }
    .social-bar a { display:flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:50%; border:1px solid var(--border-a); color:var(--text-muted); text-decoration:none; transition:border-color 0.25s, color 0.25s; }
    .social-bar a:hover { border-color:var(--accent); color:var(--text); }
    .social-bar a svg { width:20px; height:20px; }

    /* ====== FOOTER ====== */
    .footer { max-width:480px; margin:0 auto; display:flex; align-items:center; justify-content:center; gap:8px; padding:12px 20px 44px; color:var(--text-muted); font-size:10px; letter-spacing:0.5px; position:relative; z-index:2; }
    .footer a { color:var(--text-muted); text-decoration:none; }
    .footer a:hover { color:var(--accent); }

    @media (max-width:520px) {
      .hero-name { font-size:44px; }
      .hist-year, .award-year { width:68px; min-width:68px; }
    }
  </style>
</head>
<body class="pat1">

<!-- Background layers -->
<div class="bg-layer" id="bgLayer"></div>
<div class="bg-overlay"></div>

<!-- HERO: Pattern 1 -->
<div class="p1-hero" id="p1Hero"></div>

<!-- HERO: Pattern 2 -->
<div class="p2-hero"><div id="heroP2"></div></div>

<!-- HERO: Pattern 3 -->
<div class="p3-hero" id="p3Hero"></div>

<!-- FEATURED (standalone) -->
<div class="featured-section" id="featuredSection"></div>

<!-- RECOMMEND CAROUSEL -->
<div class="recommend-section" id="recommendSection">
  <div class="recommend-header">
    <span class="recommend-label">Recommend</span>
    <span class="recommend-count" id="recommendCount"></span>
  </div>
  <div id="recommendCarousel" style="overflow:hidden;">
    <div class="recommend-track" id="recommendTrack"></div>
  </div>
  <div class="recommend-dots" id="recommendDots"></div>
</div>

<!-- UPCOMING (standalone) -->
<div class="upcoming-section" id="upcomingSection"></div>

<!-- ABOUT -->
<div class="about-section">
  <div class="about-label">About</div>
  <div class="about-text" id="aboutText"></div>
  <button class="about-toggle" id="aboutToggle" onclick="toggleAbout()">Read more</button>
</div>

<!-- SECTION TOC + ACCORDION BODIES -->
<div class="toc-section" id="tocSection">
  <div class="toc-item" data-sec="history" onclick="toggleToc(this)">
    <span class="toc-label">History</span>
    <svg class="toc-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="toc-body" id="tocHistory"></div>

  <div class="toc-item open" data-sec="download" onclick="toggleToc(this)">
    <span class="toc-label">Download</span>
    <svg class="toc-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="toc-body" id="tocDownload" style="display:block"></div>

  <div class="toc-item" data-sec="contact" onclick="toggleToc(this)">
    <span class="toc-label">Contact</span>
    <svg class="toc-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="toc-body" id="tocContact"></div>
</div>

<!-- SOCIAL ICON BAR -->
<div class="social-bar" id="socialBar"></div>

<!-- Footer -->
<div class="footer">Powered by <a href="https://www.thirdkagura.com" target="_blank">THIRD KAGURA</a> <a href="https://www.instagram.com/third_kagura_pty_ltd/" target="_blank" style="color:inherit;text-decoration:none;vertical-align:middle;margin-left:6px;display:inline-block;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg></a></div>

<script>
// ══════════════════════════
// STATE
// ══════════════════════════
let profileData = null;
let currentDesign = 1;
let recommendInterval = null;
let currentRecommend = 0;

// ══════════════════════════
// URL PARAMS
// ══════════════════════════
function getUrlParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

// ══════════════════════════
// HELPERS
// ══════════════════════════
function esc(s) { const d = document.createElement('div'); d.textContent = String(s||''); return d.innerHTML; }
function jp(s) { try { return JSON.parse(s); } catch(e) { return null; } }
function formatDate(s) { try { const d=new Date(s); const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return d.getDate()+' '+m[d.getMonth()]+' '+d.getFullYear(); } catch(e){return s;} }
function formatYearMonth(s) { if (!s) return ''; const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; const parts=String(s).split('-'); if(parts.length===2){const mi=parseInt(parts[1],10)-1; return (mi>=0&&mi<12?m[mi]+' ':'')+parts[0];} return s; }
function splitYearMonth(s) { if (!s) return {month:'',year:''}; const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; const parts=String(s).split('-'); if(parts.length===2){const mi=parseInt(parts[1],10)-1; return {month:(mi>=0&&mi<12?m[mi]+'.':''),year:parts[0]};} return {month:'',year:s}; }

// Fee privacy: §PV§{base64} = private, plain text = public
const FEE_PRIVATE_PREFIX = '§PV§';
function isFeePrivate(val) { return val && val.startsWith(FEE_PRIVATE_PREFIX); }
function decodeFee(val) { if (!isFeePrivate(val)) return val; try { return decodeURIComponent(escape(atob(val.slice(FEE_PRIVATE_PREFIX.length)))); } catch(e) { return ''; } }

// LOAD & RENDER
// ══════════════════════════
async function loadProfile() {
  const slug = getUrlParam('id');
  const designParam = getUrlParam('design');

  if (!slug) {
    showError('Missing profile ID');
    return;
  }

  currentDesign = designParam ? parseInt(designParam) : 1;
  if (![1,2,3].includes(currentDesign)) currentDesign = 1;

  try {
    const gasUrl = 'https://script.google.com/macros/s/AKfycbyNJ5Wk7frGflBAmZ_2gLu3NrDOKf1g_WYT6sOW-rHXQuCg6FzWwLaoT7pZOOZyXee2/exec?action=get_profile&slug=' + encodeURIComponent(slug);
    const response = await fetch(gasUrl);
    const result = await response.json();

    if (result.error) {
      showError(result.error);
      return;
    }

    profileData = result;
    render();
  } catch (err) {
    showError('Failed to load profile: ' + err.message);
  }
}

function showError(msg) {
  const el = document.getElementById('p1Hero');
  if (el) el.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text-muted);">Error: ' + esc(msg) + '</div>';
}

function render() {
  if (!profileData) return;

  document.body.classList.remove('pat1','pat2','pat3bg');
  document.getElementById('bgLayer').style.backgroundImage = '';

  const p1 = document.getElementById('p1Hero');
  if (p1) p1.innerHTML = '';
  const p3 = document.getElementById('p3Hero');
  if (p3) p3.innerHTML = '';
  const p2 = document.getElementById('heroP2');
  if (p2) p2.innerHTML = '';

  const featEl = document.getElementById('featuredSection');
  if (featEl) featEl.innerHTML = '';
  const upEl = document.getElementById('upcomingSection');
  if (upEl) upEl.innerHTML = '';

  ['tocHistory','tocContact','tocDownload'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '';
  });

  const tocItems = document.querySelectorAll('.toc-item');
  tocItems.forEach(el => { if (el.dataset.sec !== 'download') el?.classList.remove('open'); });

  const aboutText = document.getElementById('aboutText');
  if (aboutText) {
    aboutText.textContent = '';
    aboutText.classList.remove('expanded');
  }
  const aboutToggle = document.getElementById('aboutToggle');
  if (aboutToggle) aboutToggle.style.display = 'none';

  const track = document.getElementById('recommendTrack');
  if (track) track.innerHTML = '';
  const dots = document.getElementById('recommendDots');
  if (dots) dots.innerHTML = '';

  const socialBar = document.getElementById('socialBar');
  if (socialBar) socialBar.innerHTML = '';

  renderProfile(profileData);
}

function renderProfile(d) {
  // ─── HERO ───
  const igUrl = d.instagram ? 'https://instagram.com/' + d.instagram.replace('@','') : '';
  const igLink = igUrl ? '<a href="'+esc(igUrl)+'" target="_blank" class="hero-icon">'+SVG.ig+'</a>' : '';
  const bookingEmails = jp(d.bookingEmails)||[];
  const firstEmail = bookingEmails.length ? bookingEmails[0].email : '';
  const mailLink = firstEmail ? '<a href="mailto:'+esc(firstEmail)+'" class="hero-icon">'+SVG.mail+'</a>' : '';

  let roles = jp(d.role)||[];
  if (typeof d.role === 'string' && !d.role.startsWith('[')) roles = d.role ? [d.role] : [];
  let genres = jp(d.genre)||[];
  if (typeof d.genre === 'string' && !d.genre.startsWith('[')) genres = d.genre ? [d.genre] : [];

  const agencyLine = d.agencyName
    ? (d.agencyWebsite
        ? '<div class="hero-agency-line"><a class="hero-agency" href="'+esc(d.agencyWebsite)+'" target="_blank">'+esc(d.agencyName)+'</a></div>'
        : '<div class="hero-agency-line"><span class="hero-agency">'+esc(d.agencyName)+'</span></div>')
    : '';

  const heroInner =
    '<h1 class="hero-name">'+esc(d.artistName||'')+' '+igLink+mailLink+'</h1>' +
    (d.location ? '<div class="hero-subtitle">Based in '+esc(d.location)+'</div>' : '') +
    agencyLine +
    (roles.length ? '<div class="hero-roles">'+esc(roles.join(' / '))+'</div>' : '') +
    (genres.length ? '<div class="genre-tags">'+genres.map(g=>'<span class="genre-tag">'+esc(g)+'</span>').join('')+'</div>' : '');

  if (currentDesign === 1) {
    document.body.classList.add('pat1');
    const p1 = document.getElementById('p1Hero');
    if (p1) {
      if (d.profilePhoto) {
        p1.innerHTML = '<img src="'+esc(d.profilePhoto)+'" alt="'+esc(d.artistName||'')+'"><div class="hero-overlay"></div><div class="hero-content">'+heroInner+'</div>';
      } else {
        p1.innerHTML = '<div class="p1-grad" style="width:100%;height:100%;background:linear-gradient(160deg,#1a1a1a,#0d0d0d);display:flex;align-items:center;justify-content:center;"></div><div class="hero-overlay"></div><div class="hero-content">'+heroInner+'</div>';
      }
    }
  } else if (currentDesign === 2) {
    document.body.classList.add('pat2');
    if (d.profilePhoto) {
      const bgLayer = document.getElementById('bgLayer');
      if (bgLayer) bgLayer.style.backgroundImage = 'url('+esc(d.profilePhoto)+')';
    }
    const p2 = document.getElementById('heroP2');
    if (p2) p2.innerHTML = heroInner;
  } else {
    document.body.classList.add('pat3bg');
    const p3 = document.getElementById('p3Hero');
    if (p3) {
      if (d.bgImage) {
        const bgLayer = document.getElementById('bgLayer');
        if (bgLayer) bgLayer.style.backgroundImage = 'url('+esc(d.bgImage)+')';
      }
      const photoHtml = d.profilePhoto ? '<img src="'+esc(d.profilePhoto)+'" alt="'+esc(d.artistName||'')+'">' : '';
      p3.innerHTML = photoHtml + '<div>' + heroInner + '</div>';
    }
  }

  // ─── RECOMMEND CAROUSEL ───
  const recs = jp(d.recommendations)||[];
  const recSection = document.getElementById('recommendSection');
  const recCount = document.getElementById('recommendCount');
  if (!d.recommendVisible || !recs.length) {
    if (recSection) recSection.style.display = 'none';
  } else {
    if (recSection) recSection.style.display = '';
    if (recCount) recCount.textContent = '(' + recs.length + ')';

    const displayCount = Math.min(d.recommendDisplayCount||3, recs.length);
    const shuffled = [...recs].sort(() => Math.random() - 0.5).slice(0, displayCount);
    const track = document.getElementById('recommendTrack');
    const dots = document.getElementById('recommendDots');

    if (track && dots) {
      shuffled.forEach((r, i) => {
        const profileUrl = r.slug ? '/presskit/' + r.slug : '#';
        const av = '<div class="recommend-avatar">'+SVG.person+'</div>';
        track.innerHTML +=
          '<div class="recommend-slide">' +
            '<div class="recommend-quote" id="rq'+i+'">'+esc(r.text||'')+'</div>' +
            '<button class="recommend-toggle" id="rt'+i+'" onclick="toggleRecommendText('+i+')">Read more</button>' +
            '<div class="recommend-meta">' +
              av +
              '<a href="'+esc(profileUrl)+'" class="recommend-name-link">' +
                '<div class="recommend-name">'+esc(r.name||'')+'</div>' +
                (r.role?'<div class="recommend-role">'+esc(r.role)+'</div>':'') +
              '</a>' +
            '</div>' +
          '</div>';
        dots.innerHTML += '<div class="recommend-dot'+(i===0?' active':'')+'" onclick="goToRecommend('+i+')"></div>';
      });

      setTimeout(() => {
        shuffled.forEach((r, i) => {
          const el = document.getElementById('rq'+i);
          if (el && el.scrollHeight > el.clientHeight + 2) {
            const toggle = document.getElementById('rt'+i);
            if (toggle) toggle.style.display = 'block';
          }
        });
      }, 100);

      if (shuffled.length > 1) {
        if (recommendInterval) clearInterval(recommendInterval);
        recommendInterval = setInterval(() => {
          currentRecommend = (currentRecommend + 1) % shuffled.length;
          updateCarousel();
        }, 5000);
      }
    }
  }

  // ─── ABOUT ───
  const bio = (d.bio||'').trim();
  if (bio) {
    const aboutText = document.getElementById('aboutText');
    if (aboutText) aboutText.textContent = bio;
    setTimeout(() => {
      const el = document.getElementById('aboutText');
      if (el && el.scrollHeight > el.clientHeight + 2) {
        const toggle = document.getElementById('aboutToggle');
        if (toggle) toggle.style.display = 'block';
      }
    }, 100);
  }

  // ─── HISTORY ───
  const activities = jp(d.activity)||[];
  const awards = jp(d.awards)||[];
  if (activities.length || awards.length) {
    let html = '';
    const residencies = activities.filter(a=>a.type==='residency');
    const headliners = activities.filter(a=>a.type==='clubGig'||a.type==='festival'||a.type==='live');
    const others = activities.filter(a=>a.type==='media'||a.type==='other');

    function histItem(period, venue, loc) {
      return '<div class="hist-item"><div class="hist-year">'+esc(period)+'</div><div><div class="hist-venue">'+esc(venue)+'</div>'+(loc?'<div class="hist-loc">'+esc(loc)+'</div>':'')+'</div></div>';
    }
    if (residencies.length) {
      html += '<div class="hist-cat"><div class="hist-cat-label">Resident</div>';
      residencies.forEach(a => {
        const s = splitYearMonth(a.startDate);
        const e = a.currentlyRunning ? {month:'',year:'Present'} : splitYearMonth(a.endDate);
        const yearHtml = '<div class="res-year-block">' +
          '<div class="res-col">'+(s.month?'<span class="res-month">'+esc(s.month)+'</span>':'')+'<span>'+esc(s.year)+'</span></div>' +
          (e.year ? '<span class="res-dash"> — </span><div class="res-col">'+(e.month?'<span class="res-month">'+esc(e.month)+'</span>':'')+'<span>'+esc(e.year)+'</span></div>' : '') +
          '</div>';
        html += '<div class="hist-item"><div class="hist-year">'+yearHtml+'</div><div><div class="hist-venue">'+esc(a.venue)+'</div>'+(a.country?'<div class="hist-loc">'+esc(a.country)+'</div>':'')+'</div></div>';
      });
      html += '</div>';
    }
    if (headliners.length) {
      html += '<div class="hist-cat"><div class="hist-cat-label">HEADLINER・SPORT</div>';
      headliners.forEach(a => {
        const loc = [a.venue, a.country].filter(Boolean).join(' · ');
        const roleLabel = (a.role||'').includes('Headliner') ? 'HEADLINER' : ((a.role||'').includes('Support') ? 'SPORT' : '');
        html += '<div class="hist-item"><div class="hist-year hl-year">'+esc(a.year||'')+(roleLabel?'<div class="hist-role-label">'+roleLabel+'</div>':'')+'</div><div><div class="hist-venue">'+esc(a.eventName||'')+'</div>'+(loc?'<div class="hist-loc">'+esc(loc)+'</div>':'')+'</div></div>';
      });
      html += '</div>';
    }
    if (others.length) {
      html += '<div class="hist-cat">';
      others.forEach(a => { html += histItem(a.year||'', a.title||'', ''); });
      html += '</div>';
    }
    if (awards.length) {
      html += '<div class="hist-cat"><div class="hist-cat-label">Award</div>';
      awards.forEach(a => { html += '<div class="award-item"><div class="award-year">'+esc(a.year||'')+'</div><div class="award-title">'+esc(a.title||'')+'</div></div>'; });
      html += '</div>';
    }
    const tocHistory = document.getElementById('tocHistory');
    if (tocHistory) tocHistory.innerHTML = html;
  }

  // ─── FEATURED (1 visible, rest behind "More") ───
  const featItems = [];
  [{label:(d.featLink1Label||'').trim(), url:(d.featLink1Url||'').trim()},
   {label:(d.featLink2Label||'').trim(), url:(d.featLink2Url||'').trim()}].forEach(fl => {
    if (!fl.label) return;
    const thumb = '<div class="feat-thumb">'+SVG.music+'</div>';
    const title = '<div class="feat-title-text">'+esc(fl.label)+'</div>';
    if (fl.url) featItems.push('<a class="feat-link" href="'+esc(fl.url)+'" target="_blank">'+thumb+title+'<span class="feat-link-arrow">'+SVG.extLink+'</span></a>');
    else featItems.push('<div class="feat-link" style="cursor:default">'+thumb+title+'</div>');
  });
  // Primary Links (supports JSON array or legacy single URL string)
  const rawSound = (d.primarySoundLink||'').trim();
  let primaryLinks = [];
  if (rawSound.startsWith('[')) { try { primaryLinks = JSON.parse(rawSound); } catch(e){} }
  else if (rawSound) { primaryLinks = [{ url: rawSound }]; }
  primaryLinks.forEach(pl => {
    if (pl.url) featItems.push('<div class="listen-item">'+buildCard(pl.url)+'</div>');
  });
  const featEl = document.getElementById('featuredSection');
  if (featEl) {
    if (featItems.length) {
      let fhtml = '<div class="featured-label">Featured</div>';
      fhtml += featItems[0];
      if (featItems.length > 1) {
        fhtml += '<div class="feat-more-wrap" id="featMore" style="display:none;">';
        for (let i=1; i<featItems.length; i++) fhtml += featItems[i];
        fhtml += '</div>';
        fhtml += '<button class="feat-more-btn" id="featMoreBtn" onclick="toggleFeatMore()">More</button>';
      }
      featEl.innerHTML = fhtml;
    } else {
      featEl.innerHTML = '';
    }
  }

  // ─── UPCOMING ───
  const upcoming = jp(d.upcoming);
  if (upcoming && upcoming.active && upcoming.shows && upcoming.shows.length) {
    let uhtml = '';
    upcoming.shows.forEach(s => {
      const dateStr = s.date ? formatDate(s.date) : '';
      const url = s.ticketUrl||''; const tag = url?'a':'div'; const href = url?' href="'+esc(url)+'" target="_blank"':'';
      uhtml += '<'+tag+' class="ticket-card"'+href+'><div class="ticket-icon">'+SVG.cal+'</div><div class="ticket-info"><div class="ticket-name">'+esc(s.name||'')+'</div>'+(s.venue?'<div class="ticket-detail">'+esc(s.venue)+'</div>':'')+(dateStr?'<div class="ticket-detail">'+esc(dateStr)+'</div>':'')+'</div></'+tag+'>';
    });
    const upEl = document.getElementById('upcomingSection');
    if (upEl) upEl.innerHTML = '<div class="upcoming-label">Upcoming</div>' + uhtml;
  }

  // ─── CONTACT (contact info only) ───
  let chtml = '';
  if (d.agencyName) chtml += '<div class="contact-agency">'+esc(d.agencyName)+'</div>';
  if (d.agencyWebsite) chtml += '<div class="contact-row"><a href="'+esc(d.agencyWebsite)+'" target="_blank">'+esc(d.agencyWebsite.replace(/^https?:\/\//,''))+'</a></div>';
  if (bookingEmails.length) {
    bookingEmails.forEach(be => {
      chtml += '<div class="contact-label">'+esc(be.label||'Booking')+'</div>';
      chtml += '<div class="contact-row"><a href="mailto:'+esc(be.email)+'">'+esc(be.email)+'</a></div>';
    });
  }
  if (d.managementEmail) {
    chtml += '<div class="contact-label">Management</div>';
    chtml += '<div class="contact-row"><a href="mailto:'+esc(d.managementEmail)+'">'+esc(d.managementEmail)+'</a></div>';
  }
  const tocContact = document.getElementById('tocContact');
  if (tocContact) tocContact.innerHTML = chtml;

  // ─── DOWNLOAD (Images + Rider + Download All) ───
  let dlHtml = '';
  const hasLogo=d.artistLogo, hasPrf=d.profilePhoto, hasPerf=d.perfPhoto;
  if (hasLogo||hasPrf||hasPerf) {
    dlHtml += '<div class="dl-grid">';
    if (hasLogo) dlHtml += '<a href="'+esc(d.artistLogo)+'" target="_blank" class="dl-thumb-wrap"><div class="dl-thumb"><img src="'+esc(d.artistLogo)+'" alt="Logo"></div><div class="dl-thumb-label">Logo</div></a>';
    if (hasPrf) dlHtml += '<a href="'+esc(d.profilePhoto)+'" target="_blank" class="dl-thumb-wrap"><div class="dl-thumb"><img src="'+esc(d.profilePhoto)+'" alt="Press Photo"></div><div class="dl-thumb-label">Press Photo</div></a>';
    if (hasPerf) dlHtml += '<a href="'+esc(d.perfPhoto)+'" target="_blank" class="dl-thumb-wrap"><div class="dl-thumb"><img src="'+esc(d.perfPhoto)+'" alt="Live Photo"></div><div class="dl-thumb-label">Live Photo</div></a>';
    dlHtml += '</div>';
  }
  if (d.techRider||d.hospRider) {
    if (hasLogo||hasPrf||hasPerf) dlHtml += '<hr class="dl-separator">';
    if (d.techRider) dlHtml += subAccHtml('Tech Rider','<div style="font-size:12px;color:var(--text-dim);line-height:1.8;white-space:pre-wrap;">'+esc(d.techRider)+'</div>');
    if (d.hospRider) dlHtml += subAccHtml('Hospitality Rider','<div style="font-size:12px;color:var(--text-dim);line-height:1.8;white-space:pre-wrap;">'+esc(d.hospRider)+'</div>');
  }
  if (hasLogo||hasPrf||hasPerf||d.techRider||d.hospRider) {
    dlHtml += '<div class="dl-all-wrap"><button class="dl-all-btn" onclick="downloadAllPdf()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download All</button></div>';
  }
  const tocDownload = document.getElementById('tocDownload');
  if (tocDownload) tocDownload.innerHTML = dlHtml;

  // ─── SOCIAL BAR ───
  const socials = jp(d.socials)||[];
  const bar = document.getElementById('socialBar');
  if (bar) {
    socials.forEach(s => {
      const icon = SVG[s.platform] || SVG.ig;
      bar.innerHTML += '<a href="'+esc(s.url)+'" target="_blank" title="'+esc(s.platform)+'">'+icon+'</a>';
    });
  }

  // Hide empty TOC items
  const tocMap = {
    'history': 'tocHistory',
    'contact': 'tocContact',
    'download': 'tocDownload'
  };
  document.querySelectorAll('.toc-item').forEach(item => {
    const sec = item?.dataset.sec;
    if (!sec) return;
    const body = document.getElementById(tocMap[sec]);
    if (body && !body.innerHTML.trim()) {
      item.style.display = 'none';
      body.style.display = 'none';
    } else {
      item.style.display = '';
      if (body) body.style.display = '';
    }
  });
}

// ══════════════════════════
// INTERACTIONS
// ══════════════════════════
function updateCarousel() {
  const track = document.getElementById('recommendTrack');
  if (track) track.style.transform = 'translateX(-' + (currentRecommend * 100) + '%)';
  document.querySelectorAll('.recommend-dot').forEach((d, i) => d?.classList.toggle('active', i === currentRecommend));
}

function goToRecommend(i) {
  currentRecommend = i;
  updateCarousel();
  if (recommendInterval) { clearInterval(recommendInterval); }
  if (profileData) {
    const recs = jp(profileData.recommendations)||[];
    const count = Math.min(profileData.recommendDisplayCount||3, recs.length);
    if (count > 1) {
      recommendInterval = setInterval(() => {
        currentRecommend = (currentRecommend + 1) % count;
        updateCarousel();
      }, 5000);
    }
  }
}

function toggleRecommendText(i) {
  const q = document.getElementById('rq'+i);
  const t = document.getElementById('rt'+i);
  if (q && t) {
    q.classList.toggle('expanded');
    t.textContent = q.classList.contains('expanded') ? 'Close' : 'Read more';
  }
}

function toggleAbout() {
  const t = document.getElementById('aboutText');
  const b = document.getElementById('aboutToggle');
  if (t && b) {
    t.classList.toggle('expanded');
    b.textContent = t.classList.contains('expanded') ? 'Close' : 'Read more';
  }
}

function toggleToc(item) {
  if (item) item.classList.toggle('open');
}

function subAccHtml(label, body) {
  return '<div class="sub-acc"><div class="sub-acc-header" onclick="this.parentElement.classList.toggle(\'open\')"><span class="sub-acc-icon"></span><span class="sub-acc-label">'+esc(label)+'</span></div><div class="sub-acc-body">'+body+'</div></div>';
}

  else if (url.includes('mixcloud.com')) { platform='Mixcloud'; cls='mc'; icon='<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M2 16V8h2l3 4 3-4h2v8h-2v-5l-3 4-3-4v5H2zm14-4a4 4 0 118 0 4 4 0 01-8 0zm2 0a2 2 0 104 0 2 2 0 00-4 0z"/></svg>'; }
  else if (url.includes('music.apple.com')) { platform='Apple Music'; cls='am'; icon='<svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M23 5.5v9.14a3.88 3.88 0 01-2.16 3.47 3.67 3.67 0 01-1.88.49 3.57 3.57 0 01-1.72-.44A2.42 2.42 0 0116 16.19a2.61 2.61 0 011.25-2.2 5.1 5.1 0 012.41-.79l1.34-.17V9.58L12 11.42v6.27a3.87 3.87 0 01-2.16 3.46 3.66 3.66 0 01-1.88.49 3.57 3.57 0 01-1.72-.44A2.42 2.42 0 015 19.23a2.61 2.61 0 011.25-2.2 5.1 5.1 0 012.41-.79L10 16.07V4.68a1.48 1.48 0 011-1.42l10.06-2.82A1.28 1.28 0 0123 1.72z"/></svg>'; }
  else if (url.includes('youtube.com')||url.includes('youtu.be')) { platform='YouTube'; cls='yt'; }
  return '<a href="'+esc(url)+'" target="_blank" class="listen-fallback"><div class="lf-icon '+cls+'">'+icon+'</div><div class="lf-text"><div class="lf-label">'+platform+'</div></div><span class="lf-arrow">'+SVG.extLink+'</span></a>';
}

function toggleFeatMore() {
  const wrap = document.getElementById('featMore');
  const btn = document.getElementById('featMoreBtn');
  if (wrap && btn) {
    const open = wrap.style.display === 'none';
    wrap.style.display = open ? 'block' : 'none';
    btn.textContent = open ? 'Close' : 'More';
  }
}

function downloadAllPdf() {
  alert('Download All as PDF — this will generate a PDF containing all downloadable assets.');
}
