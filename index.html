<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THIRD KAGURA — Press Kit Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000000;
      --surface: #141414;
      --border: #2a2a2a;
      --border-focus: #9aa3b0;
      --gold: #9aa3b0;
      --gold-dim: rgba(154, 163, 176, 0.15);
      --text: #f0f0f0;
      --text-dim: #888;
      --text-muted: #555;
      --error: #e74c3c;
      --error-bg: rgba(231, 76, 60, 0.1);
      --radius: 8px;
      --transition: 0.2s ease;
    }

    html { scroll-behavior: smooth; }
    html, body { max-width: 100vw; overflow-x: hidden; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .main-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 32px 32px;
      text-align: center;
    }
    @media (max-width:480px) { .main-card { padding: 32px 20px 24px; } }

    .logo-area {
      margin-bottom: 28px;
    }
    .logo-area h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .logo-area h1 span {
      color: var(--gold);
    }
    .logo-area p {
      font-size: 13px;
      color: var(--text-dim);
    }
    .logo-area .invite-badge {
      display: inline-block;
      margin-top: 10px;
      font-size: 18px;
      color: var(--gold);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ─── Tabs ─── */
    .tab-row {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 12px 0;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color var(--transition), border-color var(--transition);
    }
    .tab-btn:hover { color: var(--text-dim); }
    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .form-box {
      background: transparent;
      border: none;
      border-radius: 0;
      overflow: hidden;
      margin-bottom: 0;
    }
    .tab-content {
      padding: 28px 24px;
    }

    /* ─── Panels ─── */
    .panel { display: none; }
    .panel.active { display: block; }

    .field {
      margin-bottom: 18px;
      text-align: left;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      transition: border-color var(--transition);
      outline: none;
    }
    .field input:focus {
      border-color: var(--border-focus);
    }
    .field input::placeholder {
      color: var(--text-muted);
    }
    .field .hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
    }

    .error-msg {
      display: none;
      background: var(--error-bg);
      border: 1px solid var(--error);
      border-radius: var(--radius);
      color: var(--error);
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 18px;
      text-align: left;
    }
    .error-msg.show {
      display: block;
    }

    .action-btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity var(--transition);
    }
    .action-btn:hover {
      opacity: 0.9;
    }
    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .footer-note a {
      color: var(--text-dim);
      text-decoration: none;
    }
    .footer-note a:hover {
      color: var(--gold);
    }

    .copyright {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ─── Google Translate ─── */
    .gt-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: #111; border-bottom: 1px solid var(--border);
      padding: 6px 16px; text-align: right;
    }
    .gt-bar select {
      background: #000; color: var(--text-dim); border: 1px solid var(--border);
      border-radius: 4px; padding: 4px 8px; font-size: 12px; font-family: inherit;
      cursor: pointer; outline: none;
    }
    .gt-bar select:focus { border-color: var(--gold); }
    body { padding-top: 40px; }
    .goog-te-banner-frame, .skiptranslate { display: none !important; }
    body { top: 0 !important; }
  </style>
</head>
<body>

  <div class="gt-bar">
    <div id="google_translate_element"></div>
  </div>

  <div class="main-card">
    <div class="logo-area">
      <div class="invite-badge">Invitation Only</div>
    </div>

    <div class="form-box">
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('invite')">Invite Code</button>
        <button class="tab-btn" onclick="switchTab('login')">Log In</button>
      </div>

      <div class="tab-content">
        <!-- ── Invite Code Panel ── -->
        <div class="panel active" id="panel-invite">
          <div class="field">
            <label for="inviteCode">Invite Code</label>
            <input type="text" id="inviteCode" placeholder="" inputmode="numeric" pattern="[0-9]*" maxlength="10" autocomplete="off" autofocus>
            <div class="hint" id="inviteDigitHint" style="display:none;">6-10 digit code</div>
          </div>

          <div class="error-msg" id="inviteError"></div>

          <button class="action-btn" id="inviteBtn" onclick="handleInvite()">
            <span id="inviteBtnText">Continue</span>
            <div class="spinner" id="inviteBtnSpinner"></div>
          </button>

          <p class="footer-note" id="inviteHint" style="margin-top:14px;display:none;">No invite yet? Contact your referrer</p>
        </div>

        <!-- ── Login Panel ── -->
        <div class="panel" id="panel-login">
          <div class="field">
            <label for="identifier">Creator ID / Email</label>
            <input type="text" id="identifier" placeholder="" autocomplete="username">
          </div>
          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          </div>

          <div class="error-msg" id="loginError"></div>

          <button class="action-btn" id="loginBtn" onclick="handleLogin()">
            <span id="loginBtnText">Log In</span>
            <div class="spinner" id="loginBtnSpinner"></div>
          </button>

          <p id="forgotLink" style="text-align:center;margin-top:14px;display:none;"><a href="dashboard.html" style="color:var(--text-dim);font-size:12px;text-decoration:none;">Forgot password?</a></p>
        </div>
      </div>
    </div>
  </div>

  <div class="copyright">Powered by <a href="https://www.thirdkagura.com" target="_blank" style="color:var(--text-muted);text-decoration:none;">THIRD KAGURA</a> <a href="https://www.instagram.com/third_kagura_pty_ltd/" target="_blank" style="color:var(--text-muted);text-decoration:none;vertical-align:middle;margin-left:6px;display:inline-block;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg></a></div>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbyNJ5Wk7frGflBAmZ_2gLu3NrDOKf1g_WYT6sOW-rHXQuCg6FzWwLaoT7pZOOZyXee2/exec';

    /* ── Tab switching ── */
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });

      if (tab === 'invite') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('panel-invite').classList.add('active');
        document.querySelector('.invite-badge').style.display = 'inline-block';
        document.getElementById('inviteCode').focus();
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('panel-login').classList.add('active');
        document.querySelector('.invite-badge').style.display = 'none';
        document.getElementById('identifier').focus();
      }
    }

    /* ── Invite Code digits only ── */
    document.getElementById('inviteCode').addEventListener('input', function() {
      this.value = this.value.replace(/[^0-9]/g, '');
    });
    document.getElementById('inviteCode').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleInvite();
    });

    /* ── Login enter keys ── */
    document.getElementById('identifier').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin();
    });

    /* ── Helpers ── */
    function showError(id, msg) {
      var el = document.getElementById(id);
      el.innerHTML = msg;
      el.classList.add('show');
    }
    function hideError(id) {
      document.getElementById(id).classList.remove('show');
    }
    function setLoading(btnId, textId, spinnerId, on) {
      var btn = document.getElementById(btnId);
      var txt = document.getElementById(textId);
      var sp = document.getElementById(spinnerId);
      btn.disabled = on;
      txt.style.display = on ? 'none' : 'inline';
      sp.style.display = on ? 'block' : 'none';
    }

    /* ── Handle Invite Code ── */
    var inviteFailCount = 0;

    function handleInvite() {
      hideError('inviteError');
      var code = document.getElementById('inviteCode').value.trim();

      if (!code) { showError('inviteError', 'Please enter your invite code'); document.getElementById('inviteDigitHint').style.display = 'block'; return; }
      if (code.length < 6 || code.length > 10) { showError('inviteError', 'Invite code must be 6 to 10 digits'); document.getElementById('inviteDigitHint').style.display = 'block'; return; }

      setLoading('inviteBtn', 'inviteBtnText', 'inviteBtnSpinner', true);

      var params = new URLSearchParams();
      params.append('action', 'verify_invite');
      params.append('inviteId', code);

      fetch(GAS_URL + '?' + params.toString(), { method: 'GET', mode: 'cors' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.status === 'ok') {
            // Valid invite — redirect to create.html with invite code
            window.location.href = 'create.html?invite=' + encodeURIComponent(code);
          } else {
            inviteFailCount++;
            showError('inviteError', data.message || 'Invalid invite code');
            document.getElementById('inviteDigitHint').style.display = 'block';
            if (inviteFailCount >= 3) {
              document.getElementById('inviteHint').style.display = 'block';
            }
            setLoading('inviteBtn', 'inviteBtnText', 'inviteBtnSpinner', false);
          }
        })
        .catch(function(err) {
          showError('inviteError', 'Connection error. Please try again.');
          setLoading('inviteBtn', 'inviteBtnText', 'inviteBtnSpinner', false);
          console.error('Invite error:', err);
        });
    }

    /* ── Handle Login ── */
    function handleLogin() {
      hideError('loginError');
      var raw = document.getElementById('identifier').value.trim();
      var pw = document.getElementById('password').value;

      if (!raw || !pw) { showError('loginError', 'Forgot your password? <a href="dashboard.html" style="color:var(--gold);text-decoration:underline;">Reset here</a>'); return; }

      setLoading('loginBtn', 'loginBtnText', 'loginBtnSpinner', true);

      // Detect input type: email or Creator ID
      var isEmail = raw.indexOf('@') !== -1;

      var params = new URLSearchParams();
      params.append('action', 'login');
      if (isEmail) {
        params.append('email', raw.toLowerCase());
      } else {
        params.append('slug', raw.toLowerCase());
      }
      params.append('password', pw);

      fetch(GAS_URL + '?' + params.toString(), { method: 'GET', mode: 'cors' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.status === 'ok' || data.success) {
            var slug = data.slug || raw.toLowerCase();
            sessionStorage.setItem('pk_slug', slug);
            if (data.token) sessionStorage.setItem('pk_token', data.token);
            window.location.href = 'dashboard.html?slug=' + encodeURIComponent(slug);
          } else {
            showError('loginError', data.message || 'Invalid credentials');
            document.getElementById('forgotLink').style.display = 'block';
            setLoading('loginBtn', 'loginBtnText', 'loginBtnSpinner', false);
          }
        })
        .catch(function(err) {
          showError('loginError', 'Connection error. Please try again.');
          setLoading('loginBtn', 'loginBtnText', 'loginBtnSpinner', false);
          console.error('Login error:', err);
        });
    }
  </script>

  <!-- Google Translate -->
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'en',
        includedLanguages: 'en,ja,zh-CN,zh-TW,ko,es,fr,de,pt,th,vi,id,ar,ru',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
